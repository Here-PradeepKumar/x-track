name: EAS Build (Staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-athlete:
    name: Build Athlete APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build Athlete APK (EAS)
        working-directory: apps/athlete
        run: eas build --platform android --profile preview --non-interactive

  build-volunteer:
    name: Build Volunteer APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build Volunteer APK (EAS)
        working-directory: apps/volunteer
        run: eas build --platform android --profile preview --non-interactive
