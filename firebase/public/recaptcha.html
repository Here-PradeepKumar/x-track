<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: transparent; }
    #rcb { width: 100%; height: 100%; border: 0; background: transparent; cursor: pointer; display: block; }
  </style>
</head>
<body>
  <button id="rcb" type="button"></button>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script>
    var config;
    var rv;

    function postMsg(data) {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify(data));
      }
    }

    function onVerify(token) {
      postMsg({ type: 'verify', token: token });
    }

    function onError(err) {
      postMsg({ type: 'error', message: err ? String(err) : 'reCAPTCHA error' });
    }

    function init(cfg) {
      config = cfg;
      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(config);
        }
        rv = new firebase.auth.RecaptchaVerifier('rcb', {
          size: 'invisible',
          callback: onVerify,
          'error-callback': onError,
        });
        rv.render().then(function () {
          postMsg({ type: 'load' });
        }).catch(function (e) {
          onError(e && e.message);
        });
      } catch (e) {
        onError(e && e.message);
      }
    }

    function verify() {
      if (rv) {
        rv.verify().catch(function (e) {
          onError(e && e.message);
        });
      } else {
        onError('RecaptchaVerifier not initialised');
      }
    }

    // Receive messages from React Native
    document.addEventListener('message', function (e) {
      handleMessage(e.data);
    });
    window.addEventListener('message', function (e) {
      handleMessage(e.data);
    });

    function handleMessage(data) {
      try {
        var msg = typeof data === 'string' ? JSON.parse(data) : data;
        if (msg.type === 'init') init(msg.config);
        if (msg.type === 'verify') verify();
      } catch (_) {}
    }
  </script>
</body>
</html>
